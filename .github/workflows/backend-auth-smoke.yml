name: Backend Auth Smoke

on:
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend-auth-smoke.yml"
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - ".github/workflows/backend-auth-smoke.yml"

jobs:
  auth-smoke:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install backend and run auth smoke check
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          python -m app.smoke_auth
